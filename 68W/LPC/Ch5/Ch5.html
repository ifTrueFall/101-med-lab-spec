<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPC Chapter 5: Medication Administration Review</title>
    <style>
        :root {
            --primary-color: #2e7d32; /* Clinical Green */
            --secondary-color: #f1f8e9;
            --correct-color: #388e3c;
            --incorrect-color: #d32f2f;
            --border-color: #a5d6a7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f9fbe7;
            color: #1b5e20;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 20px;
        }

        h1 { color: var(--primary-color); margin: 0; }
        h3 { color: #388e3c; margin-top: 5px; font-weight: 400; }

        .top-nav {
            background-color: var(--primary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        
        .top-nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        #quiz-container { margin-top: 20px; }

        button.reset-btn {
            display: block;
            margin: 30px auto 0;
            padding: 12px 24px;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="../navigation.html">Return to LPC Menu</a> 
</nav>

<div class="container">
    <header>
        <h1>LPC Review: Chapter 5</h1>
        <h3>Medication Administration</h3>
    </header>

    <div id="quiz-container">Loading quiz questions...</div>
    
    <button class="reset-btn" onclick="location.reload()">Reset Quiz</button>
</div>

<script src="Ch5.js"></script>

<script src="../../scripts/QuizEngine.js"></script>

<script>
    window.onload = function() {
        if (typeof chapter5Questions !== 'undefined' && typeof renderQuiz === 'function') {
            renderQuiz(chapter5Questions, 'quiz-container');
        } else {
            document.getElementById('quiz-container').innerHTML = 
                "<div style='color:red; padding:20px; border:1px solid red;'>" +
                "<strong>Error:</strong> Script loading failed.<br>" +
                "1. Check if <code>Ch5.js</code> exists in this folder.<br>" +
                "2. Check if <code>QuizEngine.js</code> exists in <code>/68W/scripts/</code>." +
                "</div>";
        }
    };
</script>

</body>
</html>
