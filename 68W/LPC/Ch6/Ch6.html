<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPC Chapter 6: Injections Care Review</title>
    <style>
        :root {
            --primary-color: #5d4037; /* Warm Earthy Brown for ENT */
            --secondary-color: #efebe9;
            --correct-color: #388e3c;
            --incorrect-color: #d32f2f;
            --border-color: #bcaaa4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #fbe9e7;
            color: #3e2723;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 20px;
        }

        h1 { color: var(--primary-color); margin: 0; }
        h3 { color: #6d4c41; margin-top: 5px; font-weight: 400; }

        .top-nav {
            background-color: var(--primary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        
        .top-nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .question-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .question-text { font-weight: 600; margin-bottom: 15px; font-size: 1.1em; }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .option-label:hover { background-color: var(--secondary-color); }
        
        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 4px;
            font-size: 0.95em;
        }
        .feedback.correct { background-color: #e8f5e9; border: 1px solid #a5d6a7; color: var(--correct-color); }
        .feedback.incorrect { background-color: #ffebee; border: 1px solid #ef9a9a; color: var(--incorrect-color); }

        .correct-choice { background-color: #e8f5e9; border-color: var(--correct-color); font-weight: bold; }
        .incorrect-choice { background-color: #ffebee; border-color: var(--incorrect-color); }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="../../navigation.html">Return to Main Menu</a> 
</nav>

<div class="container">
    <header>
        <h1>LPC Review: Chapter 6</h1>
        <h3>Injections</h3>
    </header>

    <div id="quiz-container">Loading...</div>
    
    <div style="text-align:center; margin-top:20px;">
        <button onclick="location.reload()">Reset Quiz</button>
    </div>
</div>

<script src="Ch6.js"></script>

<script src="../../scripts/QuizEngine.js"></script>

<script>
    if (typeof chapter6Questions !== 'undefined' && typeof renderQuiz === 'function') {
        renderQuiz(chapter6Questions, 'quiz-container');
    } else {
        document.getElementById('quiz-container').innerHTML = 
            "<p style='color:red;'>Error: Could not load data (chapter6Questions) or engine (QuizEngine.js). Check your file paths.</p>";
    }
</script>

</body>
</html>
